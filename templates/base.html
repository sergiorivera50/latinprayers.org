<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{page_title}} · latinprayers.org</title>
  <meta name="description" content="{{page_description}}">
  <link rel="icon" type="image/png" href="/assets/img/sacred-heart.png">
  <link rel="apple-touch-icon" href="/assets/img/sacred-heart.png">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="wrap">
      <a class="brand-lockup" href="/" aria-label="latinprayers.org — home">
        <img class="brand-mark" src="/assets/img/sacred-heart.png" alt="" width="64" height="64">
        <span class="brand-text">
          <span class="brand-name">latinprayers.org</span>
          <span class="site-motto">Advocate of Tradition, the Tridentine Mass, and Catholic living</span>
        </span>
      </a>
    </div>
  </header>

  <nav class="site-nav" aria-label="Primary">
    <div class="wrap">
      <a href="/">Prayers</a>
      <span class="nav-disabled" title="Work in progress" aria-disabled="true">The Mass</span>
      <span class="nav-disabled" title="Work in progress" aria-disabled="true">The Rosary</span>
      <a href="/manifesto/">Manifesto</a>
    </div>
  </nav>

  <main id="main" class="site-main">
    <div class="wrap">
{{content}}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="footer-motto"><span lang="la">Ad maiorem Dei gloriam</span></p>
      <p class="footer-copy">© {{year}} latinprayers.org. All rights reserved.</p>
    </div>
  </footer>

  <script src="/assets/js/main.js" defer></script>
</body>
</html>
